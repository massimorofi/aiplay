# MCP Cluster - Docker Compose Configuration
#
# This compose file orchestrates the full MCP (Model Context Protocol) cluster:
# - tinymcp gateway: Central aggregator for all MCP servers
# - skillsmcp: FastMCP Skills Provider (Claude Code skills)
# - dema: MCP Control Plane (Deus Ex Machina) - orchestration engine
# - Docker MCP servers: Desktop Commander, Wikipedia, DuckDuckGo, OpenBnB Airbnb
#
# Usage:
#   docker compose -f compose_docker.yml -p mcp-cluster up -d
#   docker compose -f compose_docker.yml -p mcp-cluster down
#

services:
  # ─── MCP Gateway (tinymcp) ───────────────────────────────
  # Central gateway that aggregates all MCP servers.
  # Provides a single entry point for MCP clients to access all tools.
  #
  # Access: http://localhost:8080
  # API Docs: http://localhost:8080/docs
  mcp-gateway:
    container_name: tinymcp-gateway
    build:
      context: ../tinymcp
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SECRETS_PATH=/app/secrets.json
    volumes:
      - ./config/tinymcp/config.json:/app/config.json:ro
      - ./config/tinymcp/secrets.json:/app/secrets.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - skillsmcp
      - desktop-commander
      - wikipedia-mcp
      - duckduckgo-mcp
      - openbnb-airbnb
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Skills MCP Server (skillsmcp) ───────────────────────
  # Provides Claude Code skills as MCP tools via streamable-http transport.
  # Loads skills from the mounted skills directory.
  #
  # Access: http://localhost:3001/mcp
  skillsmcp:
    build:
      context: ../skillsmcp
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
    volumes:
      - ./skills:/home/user/.claude/skills:ro
      - ./config/skillsmcp/skills.settings.json:/app/skills.settings.json:ro
    restart: unless-stopped
    network_mode: host

  # ─── Docker MCP: Desktop Commander ───────────────────────
  # File system operations, shell execution, and Docker management.
  # Provides tools for managing files, running commands, and controlling Docker.
  #
  # Access: stdio (through gateway)
  desktop-commander:
    image: mcp/desktop-commander:latest
    stdin_open: true
    tty: true
    volumes:
      - ${HOME}:/home/user:rw
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"
    network_mode: host

  # ─── Docker MCP: Wikipedia ───────────────────────────────
  # Wikipedia search and article retrieval.
  # Provides tools for searching Wikipedia and reading articles.
  #
  # Access: stdio (through gateway)
  wikipedia-mcp:
    image: mcp/wikipedia-mcp:latest
    stdin_open: true
    tty: true
    restart: "no"
    network_mode: host

  # ─── Docker MCP: DuckDuckGo ──────────────────────────────
  # Web search via DuckDuckGo.
  # Provides tools for searching the web using DuckDuckGo.
  #
  # Access: stdio (through gateway)
  duckduckgo-mcp:
    image: mcp/duckduckgo:latest
    stdin_open: true
    tty: true
    restart: "no"
    network_mode: host

  # ─── Docker MCP: OpenBnB Airbnb ──────────────────────────
  # Airbnb-style accommodation search.
  # Provides tools for searching vacation rentals and accommodations.
  #
  # Access: stdio (through gateway)
  openbnb-airbnb:
    image: mcp/openbnb-airbnb:latest
    stdin_open: true
    tty: true
    restart: "no"
    network_mode: host

  # ─── DEMA (Deus Ex Machina) - MCP Control Plane ──────────
  # Enterprise orchestration engine that manages multi-stage agentic workflows.
  # Connects to the MCP Gateway to discover and execute tools.
  #
  # Access: http://localhost:8090
  # API Docs: http://localhost:8090/docs
  dema:
    container_name: dema-control-plane
    build:
      context: ../dema
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - DEMA_ENV=prod
      - DEMA_PORT=8090
      - DEMA_LOG_LEVEL=info
      - GATEWAY_URL=http://mcp-gateway:8080
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:1234/v1}
      - LLM_API_KEY=${LLM_API_KEY:-not-needed-for-local}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gemma-4-e4b-it}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - MEMORY_P2_THRESHOLD=${MEMORY_P2_THRESHOLD:-2000}
      - MEMORY_P3_TTL=${MEMORY_P3_TTL:-3600}
    depends_on:
      - mcp-gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    network_mode: host
    
networks:
  mcp-cluster:
    name: mcp-cluster
    driver: bridge
